name: Deploy docs (GitHub Pages)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website repo
        uses: actions/checkout@v5

      # Checkout the package repos into a temporary folder
      - name: Checkout owl-data
        uses: actions/checkout@v5
        with:
          repository: OpenWaterLab/owl-data
          path: _repos/owl-data

      - name: Checkout owl-twin
        uses: actions/checkout@v5
        with:
          repository: OpenWaterLab/owl-twin
          path: _repos/owl-twin

      - name: Checkout owl-wrrf
        uses: actions/checkout@v5
        with:
          repository: OpenWaterLab/owl-wrrf
          path: _repos/owl-wrrf
      
      - name: Checkout owl-ont
        uses: actions/checkout@v5
        with:
          repository: OpenWaterLab/owl-ont
          path: _repos/owl-ont

      # Copy docs from each repo into this site's docs/ tree
      - name: Prepare package docs folders
        run: |
            mkdir -p docs/packages/owl-data
            mkdir -p docs/packages/owl-twin
            mkdir -p docs/packages/owl-wrrf
            mkdir -p docs/packages/owl-ont

      - name: Sync package docs into site
        run: |
          if [ -d "_repos/owl-data/docs" ]; then
            rsync -av --delete _repos/owl-data/docs/ docs/packages/owl-data/
          else
            echo "No docs folder found for owl-data"
          fi
          if [ -d "_repos/owl-twin/docs" ]; then
            rsync -av --delete _repos/owl-twin/docs/ docs/packages/owl-twin/
          else
            echo "No docs folder found for owl-twin"
          fi
          if [ -d "_repos/owl-wrrf/docs" ]; then
            rsync -av --delete _repos/owl-wrrf/docs/ docs/packages/owl-wrrf/
          else
            echo "No docs folder found for owl-wrrf"
          fi
          if [ -d "_repos/owl-ont/docs" ]; then
            rsync -av --delete _repos/owl-ont/docs/ docs/packages/owl-ont/
          else
            echo "No docs folder found for owl-ont"
          fi
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install MkDocs
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material

      - name: Build site
        run: mkdocs build -v

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
            path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
